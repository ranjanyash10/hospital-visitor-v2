# DigitalOcean App Spec for Visitor Management System (VMS)
# Use this to deploy via the DigitalOcean App Platform.
# You can import this file directly in the DO "Create App" UI.

name: vms-app
region: nyc # or your preferred region
services:
  - name: server
    github:
      # REPLACEME: Replace with your actual github repo path, e.g., username/vms-repo
      repo: REPLACEME
      branch: dev
      deploy_on_push: true
    source_dir: server
    dockerfile_path: Dockerfile
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 5000
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: ${vms-db.DATABASE_URL}
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: PORT
        scope: RUN_TIME
        value: "5000"
      - key: CORS_ORIGIN
        scope: RUN_TIME
        value: "*" # Set to your actual domain later for better security
    # Health Check
    health_check:
      http_path: /health

  - name: client
    github:
      repo: REPLACEME
      branch: dev
      deploy_on_push: true
    source_dir: client
    dockerfile_path: Dockerfile
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 80
    envs:
      - key: VITE_API_URL
        scope: BUILD_TIME
        value: /api
    # This component depends on the server to handle proxy requests correctly via nginx
    internal_ports:
      - 80

databases:
  - name: vms-db
    engine: PG
    version: "15"
    size: db-s-dev-database
    num_nodes: 1
