version: '3.8'

services:
  database:
    image: postgres:15-alpine
    container_name: vms_db
    environment:
      POSTGRES_DB: vms_db
      POSTGRES_USER: vms_user
      POSTGRES_PASSWORD: vms_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql

  server:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: vms_api
    depends_on:
      - database
    environment:
      DATABASE_URL: postgres://vms_user:vms_password@database:5432/vms_db
      JWT_SECRET: ${JWT_SECRET:-super_secret_action_care_key_change_me}
      CORS_ORIGIN: http://localhost
      PORT: 5000
    expose:
      - "5000"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: vms_web
    depends_on:
      - server
    ports:
      - "80:80"
    environment:
      VITE_API_URL: /api

volumes:
  postgres_data:
